name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (exe + MSIX)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'

      - name: Publish portable exe
        shell: pwsh
        run: ./desktop/scripts/publish.ps1

      - name: Package MSIX layout
        shell: pwsh
        run: ./desktop/scripts/package-msix.ps1

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clipbridge-desktop
          path: |
            desktop/publish/Beam.exe
            desktop/dist/msix/**

  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: mobile
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clipbridge-android-debug
          path: mobile/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: GitHub Release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/clipbridge-desktop/Beam.exe
            artifacts/clipbridge-android-debug/app-debug.apk
          generate_release_notes: true
