name: Desktop CI

on:
  push:
    branches: [ main ]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-ci.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-ci.yml'

jobs:
  build:
    name: Build & Test (.NET 9 · Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore desktop/ClipBridge.sln

      - name: Build
        run: dotnet build desktop/ClipBridge.sln -c Release --no-restore

      - name: Test
        run: dotnet test desktop/ClipBridge.sln -c Release --no-build --verbosity normal
