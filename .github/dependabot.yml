version: 2
updates:
  # Dependências .NET (desktop)
  - package-ecosystem: nuget
    directory: "/desktop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Dependências Gradle (mobile)
  - package-ecosystem: gradle
    directory: "/mobile"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
